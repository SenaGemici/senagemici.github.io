---
layout: default
title: Blog
---

<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-5xl font-bold">Son Bloglarım</h1>
      <p class="py-6">
        <div class="grid grid-cols-1 sm:grid-cols-2">
            {% for post in site.posts %}
                <a href="{{ post.url }}" class="card card-border bg-base-100 w-96">
                    <div class="card-body">
                        <h2 class="card-title">{{ post.title }}</h2>
                        <p>{{ post.excerpt }}</p>
                        <div class="card-actions justify-end">
                        </div>
                    </div>
                </a>
            {% endfor %}
            </div>
      </p>
    </div>
  </div>
</div>
